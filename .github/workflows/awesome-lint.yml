name: Awesome Lint

on:
  pull_request:
    paths:
      - README.md
  push:
    branches: [master, main]
    paths:
      - README.md
  workflow_dispatch:

jobs:
  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run awesome-lint
        run: npx awesome-lint
        continue-on-error: true  # Allow some flexibility while we transition
