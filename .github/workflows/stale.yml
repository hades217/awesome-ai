name: Close stale issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'  # Daily
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-issue-message: 'This issue has been inactive for 60 days. It will be closed in 14 days unless there is new activity.'
          stale-pr-message: 'This PR has been inactive for 30 days. It will be closed in 7 days unless there is new activity.'
          close-issue-message: 'Closing as inactive. Feel free to reopen if still relevant.'
          close-pr-message: 'Closing as inactive. Feel free to reopen and rebase if you want to continue.'
          exempt-issue-labels: 'pinned,security,help-wanted'
          exempt-pr-labels: 'pinned,blocked'
